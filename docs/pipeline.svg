<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="370" viewBox="0 0 1200 370" role="img" aria-labelledby="title desc">
  <title id="title">LibreCudaISP processing pipeline</title>
  <desc id="desc">A compact two-row diagram of the Bayer, RGB, and YUV processing domains.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .domain { stroke-width: 1.5; }
      .bayer-domain { fill: #f0fdfa; stroke: #99f6e4; }
      .rgb-domain { fill: #fff7ed; stroke: #fed7aa; }
      .yuv-domain { fill: #eef2ff; stroke: #c7d2fe; }
      .domain-label { font: 700 13px Arial, Helvetica, sans-serif; letter-spacing: 1.2px; }
      .bayer-label { fill: #0f766e; }
      .rgb-label { fill: #c2410c; }
      .yuv-label { fill: #4338ca; }
      .node { fill: #ffffff; stroke-width: 1.5; }
      .bayer-node { stroke: #14b8a6; }
      .rgb-node { stroke: #f97316; }
      .yuv-node { stroke: #6366f1; }
      .transition { fill: #0f172a; stroke: #0f172a; stroke-width: 1.5; }
      .output { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .node-text { fill: #1e293b; font: 600 14px Arial, Helvetica, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .transition-text { fill: #ffffff; }
      .flow { fill: none; stroke: #94a3b8; stroke-width: 1.75; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="canvas" width="1200" height="370"/>

  <rect class="domain bayer-domain" x="20" y="18" width="1160" height="145" rx="14"/>
  <text class="domain-label bayer-label" x="42" y="45">BAYER DOMAIN</text>

  <rect class="node bayer-node" x="45" y="75" width="125" height="54" rx="9"/>
  <text class="node-text" x="107.5" y="102">Raw Unpack</text>
  <path class="flow" d="M170 102 H193"/>

  <rect class="node bayer-node" x="195" y="75" width="125" height="54" rx="9"/>
  <text class="node-text" x="257.5" y="102">Black Level</text>
  <path class="flow" d="M320 102 H343"/>

  <rect class="node bayer-node" x="345" y="75" width="135" height="54" rx="9"/>
  <text class="node-text" x="412.5" y="102">Linearization</text>
  <path class="flow" d="M480 102 H503"/>

  <rect class="node bayer-node" x="505" y="75" width="145" height="54" rx="9"/>
  <text class="node-text" x="577.5" y="102">Defect Correction</text>
  <path class="flow" d="M650 102 H673"/>

  <rect class="node bayer-node" x="675" y="75" width="130" height="54" rx="9"/>
  <text class="node-text" x="740" y="102">Lens Shading</text>
  <path class="flow" d="M805 102 H828"/>

  <rect class="node bayer-node" x="830" y="75" width="165" height="54" rx="9"/>
  <text class="node-text" x="912.5" y="102">Auto White Balance</text>
  <path class="flow" d="M995 102 H1018"/>

  <rect class="transition" x="1020" y="75" width="135" height="54" rx="9"/>
  <text class="node-text transition-text" x="1087.5" y="102">Demosaic</text>

  <rect class="domain yuv-domain" x="20" y="207" width="465" height="145" rx="14"/>
  <text class="domain-label yuv-label" x="42" y="234">YUV DOMAIN</text>

  <rect class="output" x="35" y="264" width="95" height="54" rx="9"/>
  <text class="node-text" x="82.5" y="291">RGB Output</text>

  <rect class="transition" x="150" y="264" width="95" height="54" rx="9"/>
  <text class="node-text transition-text" x="197.5" y="291">Output Pack</text>
  <path class="flow" d="M150 291 H132"/>

  <rect class="node yuv-node" x="265" y="264" width="105" height="54" rx="9"/>
  <text class="node-text" x="317.5" y="291">Edge Enhance</text>
  <path class="flow" d="M265 291 H247"/>

  <rect class="node yuv-node" x="390" y="264" width="75" height="54" rx="9"/>
  <text class="node-text" x="427.5" y="291">Denoise</text>
  <path class="flow" d="M390 291 H372"/>

  <rect class="domain rgb-domain" x="510" y="207" width="670" height="145" rx="14"/>
  <text class="domain-label rgb-label" x="532" y="234">RGB DOMAIN</text>

  <rect class="transition" x="535" y="264" width="140" height="54" rx="9"/>
  <text class="node-text transition-text" x="605" y="291">RGB to YUV</text>
  <path class="flow" d="M535 291 H467"/>

  <rect class="node rgb-node" x="705" y="264" width="100" height="54" rx="9"/>
  <text class="node-text" x="755" y="291">Gamma</text>
  <path class="flow" d="M705 291 H677"/>

  <rect class="node rgb-node" x="835" y="264" width="135" height="54" rx="9"/>
  <text class="node-text" x="902.5" y="291">Tone Mapping</text>
  <path class="flow" d="M835 291 H807"/>

  <rect class="node rgb-node" x="1010" y="264" width="145" height="54" rx="9"/>
  <text class="node-text" x="1082.5" y="291">Color Matrix</text>
  <path class="flow" d="M1010 291 H972"/>

  <path class="flow" d="M1087.5 129 V262"/>
</svg>
